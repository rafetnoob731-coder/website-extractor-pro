services:
  - type: web
    name: website-extractor-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 4 --worker-class gevent --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: MAX_PAGES
        value: "100"
      - key: MAX_DEPTH
        value: "5"
      - key: REQUEST_TIMEOUT
        value: "30"
